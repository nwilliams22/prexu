name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Windows libmpv dev archive URL. Use the **baseline** (non-v3) build — the
# AVX2 v3 build fails LoadLibrary with ERROR_NOACCESS on Windows 11 (see
# docs/native-player-status.md). Same pinned release + SHA256 as ci.yml; keep
# the two workflows in lockstep when bumping. Override per-run via the
# `LIBMPV_URL`/`LIBMPV_SHA256` repository variables (e.g. to point at a
# vendored copy under this repo's Releases). The SHA256 is verified after
# download and a mismatch fails the build; cache invalidates automatically
# when the URL or SHA256 changes.
env:
  LIBMPV_URL: ${{ vars.LIBMPV_URL || 'https://github.com/zhongfly/mpv-winbuild/releases/download/2026-05-29-13a3e3ad0e/mpv-dev-x86_64-20260529-git-13a3e3ad0e.7z' }}
  LIBMPV_SHA256: ${{ vars.LIBMPV_SHA256 || '2c4883c8836b53465796aca61e16f7ce6c3adda818baadc850b9f2a39bd2ce5d' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libmpv-dev
          # libmpv-dev provides libmpv.so + mpv.pc so libmpv2-sys links the
          # system libmpv (no MPV_SOURCE on Linux — that path is Windows-only).
          # Without it tauri-action's cargo build fails at link with -lmpv
          # unresolved, and no Linux bundle is produced.

      # ── Windows: libmpv dev files ───────────────────────────────────────
      # The libmpv2 crate's `build_libmpv` feature on Windows expects a layout
      # of `MPV_SOURCE/64/{libmpv-2.dll, mpv.lib}`. shinchiro's archive ships
      # only the DLL + GNU import lib (libmpv.dll.a); we generate the MSVC-
      # format mpv.lib from the DLL exports using dumpbin + lib.
      - name: Cache libmpv (Windows)
        if: runner.os == 'Windows'
        id: cache-libmpv
        uses: actions/cache@v4
        with:
          path: C:\libmpv
          key: libmpv-${{ hashFiles('.github/workflows/release.yml') }}-${{ env.LIBMPV_URL }}-${{ env.LIBMPV_SHA256 }}

      - name: Setup MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install libmpv (Windows)
        if: runner.os == 'Windows' && steps.cache-libmpv.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path C:\libmpv\64 | Out-Null
          Write-Host "Downloading libmpv from $env:LIBMPV_URL"
          Invoke-WebRequest -Uri $env:LIBMPV_URL -OutFile mpv-dev.7z -UseBasicParsing
          $actual = (Get-FileHash mpv-dev.7z -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $env:LIBMPV_SHA256.ToLower()) {
            Write-Error "SHA256 mismatch: expected $env:LIBMPV_SHA256 got $actual"
            exit 1
          }
          Write-Host "SHA256 verified: $actual"
          Write-Host "Extracting to C:\libmpv\64"
          7z x mpv-dev.7z -oC:\libmpv\64 -y | Out-Null
          if (-not (Test-Path C:\libmpv\64\libmpv-2.dll)) {
              throw "libmpv-2.dll not found after extraction — archive layout may have changed"
          }
          Write-Host "Generating mpv.lib from libmpv-2.dll exports"
          Push-Location C:\libmpv\64
          # Parse dumpbin /EXPORTS output: lines with `<ord> <hint> <RVA> <name>`
          # are exports. Filter to mpv_* symbols and emit a .def file that lib.exe
          # can turn into an MSVC-format import library.
          $exports = & dumpbin /EXPORTS libmpv-2.dll
          $symbols = $exports `
              | ForEach-Object {
                  if ($_ -match '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)') {
                      $matches[1]
                  }
              } `
              | Where-Object { $_ -like 'mpv_*' }
          if ($symbols.Count -eq 0) {
              throw "No mpv_* exports found in libmpv-2.dll — dumpbin output format may have changed"
          }
          Write-Host "Found $($symbols.Count) mpv_* exports"
          $defLines = @("LIBRARY libmpv-2", "EXPORTS") + $symbols
          Set-Content -Path mpv.def -Value $defLines -Encoding ASCII
          & lib /def:mpv.def /out:mpv.lib /machine:x64
          if (-not (Test-Path mpv.lib)) {
              throw "lib.exe failed to produce mpv.lib"
          }
          Pop-Location
          Write-Host "libmpv install complete"

      - name: Export MPV_SOURCE (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "MPV_SOURCE=C:\libmpv"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\libmpv\64"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Prexu v__VERSION__"
          releaseBody: "See the [changelog](https://github.com/prexu/prexu/blob/main/CHANGELOG.md) for details."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  cleanup:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Delete old releases (keep last 3)
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 3
          delete_tags: true
          # Strict semver vN.N.N only — must NOT match the libmpv-vendor archive tag
          delete_tag_pattern: '^v\d+\.\d+\.\d+$'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
