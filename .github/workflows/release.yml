name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Windows libmpv dev archive URL. Use the **baseline** (non-v3) build — the
# AVX2 v3 build fails LoadLibrary with ERROR_NOACCESS on Windows 11 (see
# docs/native-player-status.md). Same pinned release + SHA256 as ci.yml; keep
# the two workflows in lockstep when bumping. Override per-run via the
# `LIBMPV_URL`/`LIBMPV_SHA256` repository variables (e.g. to point at a
# vendored copy under this repo's Releases). The SHA256 is verified after
# download and a mismatch fails the build; cache invalidates automatically
# when the URL or SHA256 changes.
env:
  LIBMPV_URL: ${{ vars.LIBMPV_URL || 'https://github.com/zhongfly/mpv-winbuild/releases/download/2026-05-29-13a3e3ad0e/mpv-dev-x86_64-20260529-git-13a3e3ad0e.7z' }}
  LIBMPV_SHA256: ${{ vars.LIBMPV_SHA256 || '2c4883c8836b53465796aca61e16f7ce6c3adda818baadc850b9f2a39bd2ce5d' }}
  # Pinned ANGLE runtime DLLs (libEGL/libGLESv2) for the Windows native-player
  # render path. Hosted as assets on this repo's non-semver `angle-vendor-1`
  # release. The SHA256s MUST match the pins in
  # src-tauri/src/player/angle_loader.rs (EGL_SHA256 / GLESV2_SHA256) or the
  # player rejects the DLLs at load time. Verified after download; a mismatch
  # fails the build.
  ANGLE_EGL_URL: ${{ vars.ANGLE_EGL_URL || 'https://github.com/nwilliams22/prexu/releases/download/angle-vendor-1/libEGL.dll' }}
  ANGLE_EGL_SHA256: ${{ vars.ANGLE_EGL_SHA256 || 'a86422d6d679dda4c00bb0db813884eb14857924eb391fb48283dfca5be007ef' }}
  ANGLE_GLESV2_URL: ${{ vars.ANGLE_GLESV2_URL || 'https://github.com/nwilliams22/prexu/releases/download/angle-vendor-1/libGLESv2.dll' }}
  ANGLE_GLESV2_SHA256: ${{ vars.ANGLE_GLESV2_SHA256 || 'b48565279ebfcc75675e9b88a1835bd9fd94016290641bc98108ae382962b2f3' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Windows-only for now: the native player (libmpv) is Windows-only and
        # the player module is not yet gated for non-Windows builds, so the
        # macOS/Linux legs fail at link (`-lmpv` not found). Re-add the
        # ubuntu/macos targets once that gating lands (tracked under the Linux
        # native-parity track). See docs/adr-native-player-cross-platform.md.
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      # ── Windows: libmpv dev files ───────────────────────────────────────
      # The libmpv2 crate's `build_libmpv` feature on Windows expects a layout
      # of `MPV_SOURCE/64/{libmpv-2.dll, mpv.lib}`. shinchiro's archive ships
      # only the DLL + GNU import lib (libmpv.dll.a); we generate the MSVC-
      # format mpv.lib from the DLL exports using dumpbin + lib.
      - name: Cache libmpv (Windows)
        if: runner.os == 'Windows'
        id: cache-libmpv
        uses: actions/cache@v4
        with:
          path: C:\libmpv
          key: libmpv-${{ hashFiles('.github/workflows/release.yml') }}-${{ env.LIBMPV_URL }}-${{ env.LIBMPV_SHA256 }}

      - name: Setup MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install libmpv (Windows)
        if: runner.os == 'Windows' && steps.cache-libmpv.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path C:\libmpv\64 | Out-Null
          Write-Host "Downloading libmpv from $env:LIBMPV_URL"
          Invoke-WebRequest -Uri $env:LIBMPV_URL -OutFile mpv-dev.7z -UseBasicParsing
          $actual = (Get-FileHash mpv-dev.7z -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $env:LIBMPV_SHA256.ToLower()) {
            Write-Error "SHA256 mismatch: expected $env:LIBMPV_SHA256 got $actual"
            exit 1
          }
          Write-Host "SHA256 verified: $actual"
          Write-Host "Extracting to C:\libmpv\64"
          7z x mpv-dev.7z -oC:\libmpv\64 -y | Out-Null
          if (-not (Test-Path C:\libmpv\64\libmpv-2.dll)) {
              throw "libmpv-2.dll not found after extraction — archive layout may have changed"
          }
          Write-Host "Generating mpv.lib from libmpv-2.dll exports"
          Push-Location C:\libmpv\64
          # Parse dumpbin /EXPORTS output: lines with `<ord> <hint> <RVA> <name>`
          # are exports. Filter to mpv_* symbols and emit a .def file that lib.exe
          # can turn into an MSVC-format import library.
          $exports = & dumpbin /EXPORTS libmpv-2.dll
          $symbols = $exports `
              | ForEach-Object {
                  if ($_ -match '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)') {
                      $matches[1]
                  }
              } `
              | Where-Object { $_ -like 'mpv_*' }
          if ($symbols.Count -eq 0) {
              throw "No mpv_* exports found in libmpv-2.dll — dumpbin output format may have changed"
          }
          Write-Host "Found $($symbols.Count) mpv_* exports"
          $defLines = @("LIBRARY libmpv-2", "EXPORTS") + $symbols
          Set-Content -Path mpv.def -Value $defLines -Encoding ASCII
          & lib /def:mpv.def /out:mpv.lib /machine:x64
          if (-not (Test-Path mpv.lib)) {
              throw "lib.exe failed to produce mpv.lib"
          }
          Pop-Location
          Write-Host "libmpv install complete"

      - name: Export MPV_SOURCE (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "MPV_SOURCE=C:\libmpv"
          Add-Content -Path $env:GITHUB_PATH -Value "C:\libmpv\64"

      # ── Windows: ANGLE runtime DLLs ─────────────────────────────────────
      # The native player's DirectComposition render path loads libEGL.dll +
      # libGLESv2.dll at runtime, SHA-256-pinned + Authenticode-verified
      # (src/player/angle_loader.rs). bin/ is gitignored, so fetch the pinned
      # DLLs into src-tauri/bin/ where tauri.windows.conf.json bundles them and
      # build.rs copies them next to the dev exe. SHA256 is verified against the
      # angle_loader pins — a mismatch fails the build (the player would reject
      # the DLLs anyway).
      - name: Install ANGLE DLLs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bin = Join-Path $env:GITHUB_WORKSPACE "src-tauri\bin"
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          $dlls = @(
            @{ Name = "libEGL.dll";    Url = $env:ANGLE_EGL_URL;     Sha = $env:ANGLE_EGL_SHA256 },
            @{ Name = "libGLESv2.dll"; Url = $env:ANGLE_GLESV2_URL;  Sha = $env:ANGLE_GLESV2_SHA256 }
          )
          foreach ($d in $dlls) {
            $dest = Join-Path $bin $d.Name
            Write-Host "Downloading $($d.Name) from $($d.Url)"
            Invoke-WebRequest -Uri $d.Url -OutFile $dest -UseBasicParsing
            $actual = (Get-FileHash $dest -Algorithm SHA256).Hash.ToLower()
            if ($actual -ne $d.Sha.ToLower()) {
              Write-Error "SHA256 mismatch for $($d.Name): expected $($d.Sha) got $actual"
              exit 1
            }
            Write-Host "SHA256 verified for $($d.Name): $actual"
          }

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Prexu v__VERSION__"
          releaseBody: "See the [changelog](https://github.com/nwilliams22/prexu/blob/main/CHANGELOG.md) for details."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  cleanup:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Delete old releases (keep last 3)
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 3
          delete_tags: true
          # Strict semver vN.N.N only — must NOT match the libmpv-vendor archive tag
          delete_tag_pattern: '^v\d+\.\d+\.\d+$'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
