name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/**

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Relay server clippy
        run: cd relay-server && cargo clippy --all-targets -- -D warnings

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Chromium only: the app ships on WebView2 (Chromium-based), so chromium
      # is the representative runtime. webkit/firefox aren't shipping targets
      # and add CI flake + browser-dep overhead on Linux.
      - name: E2E tests
        run: npm run test:e2e -- --project=chromium

  headless-mpv:
    name: Headless mpv integration (Windows)
    runs-on: windows-latest
    # Exercises the signal chain (init → FileLoaded → duration → eof-reached)
    # that production queue advancement (prexu-0cs / prexu-ta9) depends on.
    # Windows-only because libmpv-2.dll is a Windows binary.
    #
    # Build inputs (prexu-r8o):
    #   - src-tauri/ci/mpv/64/{mpv.lib, include/mpv/*.h} — vendored in-repo: the
    #     MSVC import lib + ISC headers we LINK against (pinned, verified).
    #   - libmpv-2.dll (119 MB runtime) — too large to commit (>GitHub 100 MB
    #     limit), so fetched from a pinned, SHA256-checksummed release below.
    #     The mpv dev archive ships only a MinGW .dll.a, not an MSVC mpv.lib,
    #     which is why the import lib stays vendored.

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Fetch ONLY the runtime DLL from a pinned, checksummed mpv dev release and
      # drop it beside the vendored mpv.lib + headers to complete MPV_SOURCE/64.
      # Pin both the release tag and the SHA256 so the binary can't change under
      # us; mismatches fail the job (supply-chain guard, per prexu-r8o).
      - name: Fetch libmpv runtime DLL (pinned + checksummed)
        shell: pwsh
        run: |
          $tag    = "2026-05-29-13a3e3ad0e"
          $asset  = "mpv-dev-x86_64-20260529-git-13a3e3ad0e.7z"
          $sha256 = "2c4883c8836b53465796aca61e16f7ce6c3adda818baadc850b9f2a39bd2ce5d"
          $url    = "https://github.com/zhongfly/mpv-winbuild/releases/download/$tag/$asset"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $asset
          $actual = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $sha256) {
            Write-Error "SHA256 mismatch: expected $sha256 got $actual"
            exit 1
          }
          Write-Host "SHA256 verified: $actual"
          # 7-Zip is preinstalled on windows-latest. -r finds libmpv-2.dll
          # regardless of its path inside the archive (it is at the root).
          7z e -y -r "$asset" "-osrc-tauri\ci\mpv\64" libmpv-2.dll
          if (-not (Test-Path "src-tauri\ci\mpv\64\libmpv-2.dll")) {
            Write-Error "libmpv-2.dll was not extracted from $asset"
            exit 1
          }
          Get-ChildItem -Recurse "src-tauri\ci\mpv\64" | ForEach-Object { Write-Host "  $($_.FullName)" }

      # MPV_SOURCE points libmpv2-sys's build script at the vendored mpv.lib +
      # headers; build.rs also copies libmpv-2.dll to target\debug\ for runtime.
      # Clippy must run here, not in the ubuntu `ci` job: src-tauri links libmpv2
      # (build_libmpv) and needs MPV_SOURCE, which is only set up on this runner.
      - name: src-tauri clippy
        working-directory: src-tauri
        env:
          MPV_SOURCE: ${{ github.workspace }}\src-tauri\ci\mpv
        run: cargo clippy --all-targets -- -D warnings

      - name: Build headless_mpv test binary
        working-directory: src-tauri
        env:
          MPV_SOURCE: ${{ github.workspace }}\src-tauri\ci\mpv
        run: cargo test --test headless_mpv --no-run

      # The test binary lives in target\debug\deps\; ensure libmpv-2.dll is in
      # that dir so the Windows loader resolves the delay-loaded DLL at runtime.
      - name: Ensure libmpv-2.dll is beside the test binary
        shell: pwsh
        run: |
          $deps = "src-tauri\target\debug\deps"
          New-Item -ItemType Directory -Force -Path $deps | Out-Null
          Copy-Item "src-tauri\ci\mpv\64\libmpv-2.dll" "$deps\libmpv-2.dll" -Force
          Write-Host "Copied libmpv-2.dll to $deps"

      - name: Run headless_mpv integration test
        working-directory: src-tauri
        env:
          MPV_SOURCE: ${{ github.workspace }}\src-tauri\ci\mpv
          RUST_LOG: debug
        run: cargo test --test headless_mpv -- --nocapture --ignored
