name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/**

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Relay server cargo check
        run: cd relay-server && cargo check

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

  headless-mpv:
    name: Headless mpv integration (Windows)
    runs-on: windows-latest
    # Exercises the signal chain (init → FileLoaded → duration → eof-reached)
    # that production queue advancement (prexu-0cs / prexu-ta9) depends on.
    # Windows-only because libmpv-2.dll is a Windows binary.
    #
    # Build inputs come entirely from the repo (no network fetch, per prexu-r8o):
    #   - src-tauri/ci/mpv/64/{mpv.lib, include/mpv/*.h} — vendored ISC dev kit
    #   - src-tauri/bin/libmpv-2.dll                      — committed runtime DLL
    # The MPV_SOURCE layout libmpv2-sys/build.rs expects is assembled below by
    # copying the DLL next to the vendored import lib + headers.

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Assemble the MPV_SOURCE/64 dir libmpv2-sys + build.rs expect: vendored
      # mpv.lib + headers are already at src-tauri/ci/mpv/64; drop the committed
      # runtime DLL in beside them so build.rs copies it to target at build time.
      - name: Assemble MPV_SOURCE from vendored dev kit
        shell: pwsh
        run: |
          Copy-Item "src-tauri\bin\libmpv-2.dll" "src-tauri\ci\mpv\64\libmpv-2.dll" -Force
          Write-Host "MPV_SOURCE assembled at src-tauri\ci\mpv:"
          Get-ChildItem -Recurse "src-tauri\ci\mpv\64" | ForEach-Object { Write-Host "  $($_.FullName)" }

      # MPV_SOURCE points libmpv2-sys's build script at the vendored mpv.lib +
      # headers; build.rs also copies libmpv-2.dll to target\debug\ for runtime.
      - name: Build headless_mpv test binary
        working-directory: src-tauri
        env:
          MPV_SOURCE: ${{ github.workspace }}\src-tauri\ci\mpv
        run: cargo test --test headless_mpv --no-run

      # The test binary lives in target\debug\deps\; ensure libmpv-2.dll is in
      # that dir so the Windows loader resolves the delay-loaded DLL at runtime.
      - name: Ensure libmpv-2.dll is beside the test binary
        shell: pwsh
        run: |
          $deps = "src-tauri\target\debug\deps"
          New-Item -ItemType Directory -Force -Path $deps | Out-Null
          Copy-Item "src-tauri\bin\libmpv-2.dll" "$deps\libmpv-2.dll" -Force
          Write-Host "Copied libmpv-2.dll to $deps"

      - name: Run headless_mpv integration test
        working-directory: src-tauri
        env:
          MPV_SOURCE: ${{ github.workspace }}\src-tauri\ci\mpv
          RUST_LOG: debug
        run: cargo test --test headless_mpv -- --nocapture --ignored
