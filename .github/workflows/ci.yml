name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/**

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      # hw-probe verdict core (prexu-pd1x.2): the mutation-checked self-tests for
      # the on-hardware probe suite. Pure nushell — no app/GPU/compositor — so it
      # enforces the log-invariant/luminance/probe verdicts on every PR. The
      # optional end-to-end luminance leg self-skips when ImageMagick v7 is absent.
      - name: Set up Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "*"

      - name: hw-probe selftest
        run: nu scripts/hw-probe/selftest.nu

      - name: Relay server clippy
        run: cd relay-server && cargo clippy --all-targets -- -D warnings

      # Unit + WS integration tests (tokio/axum, no Windows libmpv needed, so
      # they run on this ubuntu job). Guards against regressions like the
      # keepalive-tick race (prexu-waec) and rate-limit flake (prexu-3a78) that
      # previously slipped through because only clippy ran here (prexu-uy8p).
      - name: Relay server tests
        run: cd relay-server && cargo test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Chromium only: the app ships on WebView2 (Chromium-based), so chromium
      # is the representative runtime. webkit/firefox aren't shipping targets
      # and add CI flake + browser-dep overhead on Linux.
      - name: E2E tests
        run: npm run test:e2e -- --project=chromium

      # Player-chrome shim (prexu-ceiz): drives the real player chrome via
      # the "player-chrome-test" Vite mode + usePlayer stub — see
      # playwright.config.ts and src/hooks/usePlayer.playwright-stub.ts.
      # Kept as its own step (not folded into the line above) so a failure
      # here is unambiguous about which project regressed. Cheap to run —
      # a handful of specs against an already-installed chromium.
      - name: E2E tests (player-chrome)
        run: npm run test:e2e -- --project=player-chrome

  headless-mpv:
    name: Headless mpv integration (Windows)
    runs-on: windows-latest
    # Exercises the signal chain (init → FileLoaded → duration → eof-reached)
    # that production queue advancement (prexu-0cs / prexu-ta9) depends on.
    # Windows-only because libmpv-2.dll is a Windows binary.
    #
    # Build inputs (prexu-r8o):
    #   - src-tauri/ci/mpv/64/{mpv.lib, include/mpv/*.h} — vendored in-repo: the
    #     MSVC import lib + ISC headers we LINK against (pinned, verified).
    #   - libmpv-2.dll (119 MB runtime) — too large to commit (>GitHub 100 MB
    #     limit), so fetched from a pinned, SHA256-checksummed release below.
    #     The mpv dev archive ships only a MinGW .dll.a, not an MSVC mpv.lib,
    #     which is why the import lib stays vendored.

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Fetch ONLY the runtime DLL from our self-hosted, checksummed mpv mirror
      # and drop it beside the vendored mpv.lib + headers to complete
      # MPV_SOURCE/64. The mirror lives in this repo's `libmpv-vendor` release
      # because upstream zhongfly/mpv-winbuild deletes nightlies within days,
      # 404ing any pinned upstream URL (prexu-n1wt). Pin the SHA256 so the
      # binary can't change under us; mismatches fail the job (supply-chain
      # guard, per prexu-r8o). Keep asset + SHA256 in lockstep with release.yml.
      - name: Fetch libmpv runtime DLL (pinned + checksummed)
        shell: pwsh
        run: |
          $asset  = "mpv-dev-x86_64-20260629-git-3f1b23abd0.7z"
          $sha256 = "ea0a4aa3bdb1fc225c5fa4f73f7a705e06fae84f99fc8f9946757e99eb5f5a26"
          $url    = "https://github.com/nwilliams22/prexu/releases/download/libmpv-vendor/$asset"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $asset
          $actual = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $sha256) {
            Write-Error "SHA256 mismatch: expected $sha256 got $actual"
            exit 1
          }
          Write-Host "SHA256 verified: $actual"
          # 7-Zip is preinstalled on windows-latest. -r finds libmpv-2.dll
          # regardless of its path inside the archive (it is at the root).
          7z e -y -r "$asset" "-osrc-tauri\ci\mpv\64" libmpv-2.dll
          if (-not (Test-Path "src-tauri\ci\mpv\64\libmpv-2.dll")) {
            Write-Error "libmpv-2.dll was not extracted from $asset"
            exit 1
          }
          Get-ChildItem -Recurse "src-tauri\ci\mpv\64" | ForEach-Object { Write-Host "  $($_.FullName)" }

      # Path C3d bundles the ANGLE DLLs (libEGL/libGLESv2) as Tauri resources,
      # so tauri_build validates they exist even for `cargo clippy`. This headless
      # job never loads ANGLE (no GPU / no composition render path), so stub the
      # DLLs to satisfy the resource-path check. The real runtime SHA-256 +
      # Authenticode verification (player::angle_loader) is unaffected — it runs
      # only when the app initialises the video render path, which this job never
      # does. The DLLs are gitignored binaries provided out-of-band locally.
      - name: Stub ANGLE DLLs for resource validation (headless, never loaded)
        shell: pwsh
        run: |
          $bin = "src-tauri\bin"
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          foreach ($n in @("libEGL.dll", "libGLESv2.dll")) {
            $p = Join-Path $bin $n
            if (-not (Test-Path $p)) {
              [System.IO.File]::WriteAllBytes($p, [byte[]](0x4D, 0x5A))
              Write-Host "Stubbed $p"
            }
          }

      # MPV_SOURCE points libmpv2-sys's build script at the vendored mpv.lib +
      # headers; build.rs also copies libmpv-2.dll to target\debug\ for runtime.
      # Clippy must run here, not in the ubuntu `ci` job: src-tauri links libmpv2
      # (build_libmpv) and needs MPV_SOURCE, which is only set up on this runner.
      - name: src-tauri clippy
        working-directory: src-tauri
        env:
          MPV_SOURCE: ${{ github.workspace }}\src-tauri\ci\mpv
        run: cargo clippy --all-targets -- -D warnings

      - name: Build headless_mpv test binary
        working-directory: src-tauri
        env:
          MPV_SOURCE: ${{ github.workspace }}\src-tauri\ci\mpv
        run: cargo test --test headless_mpv --no-run

      # The test binary lives in target\debug\deps\; ensure libmpv-2.dll is in
      # that dir so the Windows loader resolves the delay-loaded DLL at runtime.
      - name: Ensure libmpv-2.dll is beside the test binary
        shell: pwsh
        run: |
          $deps = "src-tauri\target\debug\deps"
          New-Item -ItemType Directory -Force -Path $deps | Out-Null
          Copy-Item "src-tauri\ci\mpv\64\libmpv-2.dll" "$deps\libmpv-2.dll" -Force
          Write-Host "Copied libmpv-2.dll to $deps"

      - name: Run headless_mpv integration test
        working-directory: src-tauri
        env:
          MPV_SOURCE: ${{ github.workspace }}\src-tauri\ci\mpv
          RUST_LOG: debug
        run: cargo test --test headless_mpv -- --nocapture --ignored

      # This job stubs the ANGLE DLLs (see the stub step above), so the two
      # DLL-integrity tests (SHA-256 pin + Authenticode) can never pass here
      # and are skipped. They validate real artifacts on real Windows boxes
      # and in release packaging, not CI stubs.
      - name: Run src-tauri lib tests
        working-directory: src-tauri
        env:
          MPV_SOURCE: ${{ github.workspace }}\src-tauri\ci\mpv
        run: cargo test --lib -- --skip angle_dlls_match_sha256_pins --skip angle_dlls_authenticode_valid

  headless-mpv-linux:
    name: Headless mpv integration (Linux, libmpv 2.x)
    runs-on: ubuntu-24.04
    # Validates the signal chain on Linux using system libmpv with API 2.x.
    # ubuntu-24.04 ships libmpv.so.2 (mpv 2.x), whereas ubuntu-22.04 has only
    # API 1.x (mpv 0.35) and fails with VersionMismatch. This job mirrors the
    # Windows headless job but uses the system libmpv instead of a bundled DLL.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libmpv-dev

      - name: Verify libmpv version
        run: |
          echo "Installed libmpv version:"
          apt-cache policy libmpv-dev
          echo ""
          echo "libmpv.so symlinks:"
          ldconfig -p | grep libmpv

      - name: Run headless_mpv integration test
        working-directory: src-tauri
        env:
          RUST_LOG: debug
        run: cargo test --test headless_mpv -- --nocapture --ignored

  linux-build:
    name: Linux src-tauri build (native player + libmpv)
    runs-on: ubuntu-22.04
    # Compiles + LINKS src-tauri on Linux WITH the native libmpv player
    # (prexu-axj4). This inverts the old "non-Windows gating" premise
    # (prexu-nesp): since prexu-axj4.3 the player module compiles on Linux and
    # dynamically links the system libmpv (libmpv-dev below), so a missing
    # -lmpv here means the Linux provisioning broke, not that gating leaked.
    # macOS remains gated off (no player module compiles there).
    # Mirrors the release.yml Linux deps.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libmpv-dev

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # generate_context!() embeds the frontend dist at compile time, so the
      # bundle must exist before cargo build.
      - name: Build frontend
        run: npm run build

      - name: Lint src-tauri (clippy)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      # Mechanical proof (prexu-ceiz) that the player-chrome-test Vite alias
      # (vite.config.ts) never reaches a real production build: this IS the
      # same `npm run build` (mode "production", no --mode flag) that ships
      # in the actual app bundle below. Grep the built output for the stub
      # module's distinctive marker string (also used in its own mode-guard
      # throw) — zero matches proves the stub was never resolved into this
      # bundle.
      - name: Verify player-chrome test stub absent from production bundle
        run: |
          if grep -R "PLAYER_CHROME_TEST_STUB_v1" dist/; then
            echo "ERROR: player-chrome test stub leaked into the production bundle" >&2
            exit 1
          fi
          echo "OK: player-chrome test stub marker absent from dist/"

      - name: Build src-tauri (native player, system libmpv)
        working-directory: src-tauri
        run: cargo build

      - name: Test src-tauri
        working-directory: src-tauri
        run: cargo test

  desktop-smoke-linux:
    name: "Desktop smoke (Xvfb, Linux) [advisory]"
    runs-on: ubuntu-22.04
    # Advisory only (prexu-510g, spike prexu-pd1x.12): launches the actual
    # built binary headlessly under Xvfb and asserts launch + liveness + clean
    # exit + no zombie child. Reaching a painted dashboard needs Plex auth —
    # OUT of scope; this is process-lifecycle only. webkit2gtk under Xvfb can
    # be flaky (no real GPU/DRM device), so this job retries and never blocks
    # merges (continue-on-error). Runner mirrors linux-build/release.yml
    # (ubuntu-22.04 is what the Linux release actually ships on), so the smoke
    # exercises the same base the release AppImage targets. Builds itself
    # independently rather than downloading linux-build's output — no
    # artifact-upload/download pattern exists yet in this file, and every
    # other job here already stays decoupled the same way.
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux + Xvfb dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libmpv-dev \
            xvfb

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # generate_context!() embeds the frontend dist at compile time, so the
      # bundle must exist before cargo build (same requirement as linux-build).
      - name: Build frontend
        run: npm run build

      - name: Build src-tauri (debug)
        working-directory: src-tauri
        run: cargo build

      # Launch the real binary under Xvfb and assert it launches, stays alive
      # for a liveness window, exits cleanly on SIGTERM, and leaves no defunct
      # child process. Scope is strictly launch/liveness/exit — a painted
      # dashboard needs a reachable Plex server + auth, which stays out of
      # scope for this smoke (prexu-pd1x.12 spike). Retries once: webkit2gtk
      # under Xvfb is known-flaky with no real GPU/DRM device.
      - name: Xvfb desktop smoke (launch, liveness, clean exit)
        env:
          # Xvfb has no DRM/GPU device: steer WebKit/GL off hardware-backed
          # paths so a missing DMABUF/GPU codepath degrades fail-soft (see
          # player::linux_compositor's HTML5-fallback contract) instead of
          # taking the whole webview down with it.
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: |
          set -uo pipefail

          BINARY="src-tauri/target/debug/prexu"
          INITIAL_WAIT=5
          ALIVE_SECS=18
          EXIT_TIMEOUT=15
          MAX_ATTEMPTS=2
          # Logged unconditionally at the top of
          # player::linux_compositor::install(), which setup() calls before
          # any playback/auth — present on every successful boot regardless
          # of Plex reachability.
          STARTUP_MARKER="compositor installed"

          overall_status=1

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "=== Xvfb smoke attempt ${attempt}/${MAX_ATTEMPTS} ==="
            LOGFILE="smoke-attempt-${attempt}.log"

            xvfb-run -a "$BINARY" > "$LOGFILE" 2>&1 &
            XVFB_RUN_PID=$!

            # Give the wrapper time to start Xvfb and exec the binary.
            sleep "$INITIAL_WAIT"
            APP_PID="$(pgrep -x prexu | head -1 || true)"

            if [ -z "$APP_PID" ]; then
              echo "FAIL: app did not start (no 'prexu' process found)"
              cat "$LOGFILE" || true
              kill -KILL "$XVFB_RUN_PID" 2>/dev/null || true
              continue
            fi
            echo "app pid=$APP_PID (xvfb-run wrapper pid=$XVFB_RUN_PID)"

            sleep "$ALIVE_SECS"
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "FAIL: app exited before the ${ALIVE_SECS}s liveness window elapsed"
              cat "$LOGFILE" || true
              continue
            fi
            echo "PASS: app alive after ${ALIVE_SECS}s"

            kill -TERM "$APP_PID"
            exited=0
            for _ in $(seq 1 "$EXIT_TIMEOUT"); do
              if ! kill -0 "$APP_PID" 2>/dev/null; then
                exited=1
                break
              fi
              sleep 1
            done

            if [ "$exited" -ne 1 ]; then
              echo "FAIL: app did not exit within ${EXIT_TIMEOUT}s of SIGTERM"
              kill -KILL "$APP_PID" 2>/dev/null || true
              cat "$LOGFILE" || true
              continue
            fi
            echo "PASS: app exited cleanly after SIGTERM"

            wait "$XVFB_RUN_PID" 2>/dev/null || true

            # Zombie/defunct check — concept reused from
            # scripts/hw-probe/probes.nu `zombie-verdict` / `ps-zombies`
            # (plain ps/awk here per prexu-510g; nushell not required in CI).
            zombies="$(ps -eo pid,stat,comm | awk '$2 ~ /Z/ && ($3 ~ /prexu/ || $3 ~ /mpv/) {print}')"
            if [ -n "$zombies" ]; then
              echo "FAIL: defunct process(es) found after exit:"
              echo "$zombies"
              continue
            fi
            echo "PASS: no defunct prexu/mpv processes"

            # Informational only: startup-log capture under xvfb-run can be
            # unreliable, so this never fails the smoke (prexu-510g decision)
            # — the process-lifecycle assertions above already satisfy scope.
            if grep -qF "$STARTUP_MARKER" "$LOGFILE"; then
              echo "INFO: startup marker '${STARTUP_MARKER}' found in captured log"
            else
              echo "WARN: startup marker '${STARTUP_MARKER}' not found in captured log (non-fatal)"
            fi

            overall_status=0
            break
          done

          exit "$overall_status"

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xvfb-desktop-smoke-logs
          path: smoke-attempt-*.log
          if-no-files-found: ignore
          retention-days: 7

