[tools]
node = "22"

[env]
# The Tauri backend and relay-server need cargo. Rust is provisioned by rustup
# (not mise) on the dev boxes, and rustup's `. ~/.cargo/env` line isn't in every
# shell profile — so put the rustup bin dir on PATH whenever mise activates in
# this project. Harmless if cargo is already on PATH from elsewhere.
_.path = ["{{env.HOME}}/.cargo/bin"]

# BEADS_DOLT_CLI_DIR was needed for bd <=1.0.x external-server mode (database
# at .beads/dolt/prexu). bd 1.1.0 re-init (2026-07-06) runs in embedded mode
# (.beads/embeddeddolt) and `bd dolt push/pull` work without it. Left unset;
# restore only if switching back to server mode.

# Beads issue tracker + its Dolt backend, so `mise install` provisions `bd` on
# any machine (e.g. the Linux dev box). The task graph itself travels in git as
# .beads/issues.jsonl; bd rebuilds its local Dolt DB from that jsonl on first
# run. Asset patterns per the beads install docs — verify on the box if a
# release layout changes.
[tools."github:steveyegge/beads"]
version = "latest"
[tools."github:steveyegge/beads".platforms]
linux-x64 = { asset_pattern = "beads_*_linux_amd64.tar.gz" }
macos-arm64 = { asset_pattern = "beads_*_darwin_arm64.tar.gz" }

[tools."github:dolthub/dolt"]
version = "latest"
[tools."github:dolthub/dolt".platforms]
linux-x64 = { asset_pattern = "dolt-linux-amd64.tar.gz" }
macos-arm64 = { asset_pattern = "dolt-darwin-amd64.tar.gz" }

[tasks.lint]
description = "Run oxlint over the frontend source"
run = "npm run lint"

[tasks.tsc]
description = "Run TypeScript type check"
run = "npx tsc --noEmit"

[tasks.test]
description = "Run unit tests"
run = "npx vitest run"

[tasks.cargo-check]
description = "Check relay server compilation"
dir = "relay-server"
run = "cargo check"

[tasks.e2e]
description = "Install Playwright browsers and run E2E tests"
run = "npx playwright install --with-deps chromium && npm run test:e2e -- --project=chromium"

[tasks.ci]
description = "Run full CI pipeline (lint, type check, unit tests, cargo check, E2E tests)"
depends = ["lint", "tsc", "test", "cargo-check", "e2e"]
