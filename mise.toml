[tools]
node = "22"

[env]
# The Tauri backend and relay-server need cargo. Rust is provisioned by rustup
# (not mise) on the dev boxes, and rustup's `. ~/.cargo/env` line isn't in every
# shell profile — so put the rustup bin dir on PATH whenever mise activates in
# this project. Harmless if cargo is already on PATH from elsewhere.
_.path = ["{{env.HOME}}/.cargo/bin"]

# BEADS_DOLT_CLI_DIR was needed for bd <=1.0.x external-server mode (database
# at .beads/dolt/prexu). bd 1.1.0 re-init (2026-07-06) runs in embedded mode
# (.beads/embeddeddolt) and `bd dolt push/pull` work without it. Left unset;
# restore only if switching back to server mode.

# Beads issue tracker, so `mise install` provisions `bd` on any machine (e.g.
# the Linux dev box). bd 1.1+ runs an embedded Dolt engine (.beads/embeddeddolt,
# gitignored) — the canonical store. Sync rides the git remote as refs/dolt/data
# (`bd dolt push/pull`); fresh clones run `bd bootstrap`. The tracked
# .beads/issues.jsonl is a passive export (grep/viewers/bootstrap fallback),
# not the source of truth. Asset patterns per the beads install docs — verify
# on the box if a release layout changes. (Upstream repo is now
# github.com/gastownhall/beads; the steveyegge URL redirects.)
[tools."github:steveyegge/beads"]
version = "latest"
[tools."github:steveyegge/beads".platforms]
linux-x64 = { asset_pattern = "beads_*_linux_amd64.tar.gz" }
macos-arm64 = { asset_pattern = "beads_*_darwin_arm64.tar.gz" }

# Optional since the bd 1.1.0 re-init: the embedded Dolt engine needs no
# external dolt binary. Kept only for manual `dolt` CLI inspection of the DB
# and as a fallback if we ever switch to `bd init --server` mode.
[tools."github:dolthub/dolt"]
version = "latest"
[tools."github:dolthub/dolt".platforms]
linux-x64 = { asset_pattern = "dolt-linux-amd64.tar.gz" }
macos-arm64 = { asset_pattern = "dolt-darwin-amd64.tar.gz" }

# SBOM generation + vulnerability scanning (prexu-39io). syft produces SBOMs
# per ecosystem (npm, cargo x2); grype scans them against its CVE DB. See the
# sbom/scan tasks below; scan artifacts are gitignored (point-in-time data).
[tools."ubi:anchore/syft"]
version = "latest"
[tools."ubi:anchore/grype"]
version = "latest"

# Nushell — the on-hardware probe suite (scripts/hw-probe, prexu-pd1x.2) is
# written in nu. Provisioning it here lets `mise run hw-probe:*` (and the
# CI-side selftest) work on any machine, including the Linux dev box.
[tools."github:nushell/nushell"]
version = "latest"
[tools."github:nushell/nushell".platforms]
linux-x64 = { asset_pattern = "*x86_64-unknown-linux-gnu*" }
macos-arm64 = { asset_pattern = "*aarch64-apple-darwin*" }

[tasks.sbom]
description = "Generate SBOMs for all three ecosystems (npm, tauri, relay)"
run = """
mkdir -p .sbom
syft package-lock.json -o syft-json=.sbom/npm.json -q
syft src-tauri/Cargo.lock -o syft-json=.sbom/tauri.json -q
syft relay-server/Cargo.lock -o syft-json=.sbom/relay.json -q
"""

[tasks.scan]
description = "Scan SBOMs with grype; fails on High/Critical vulnerabilities"
depends = ["sbom"]
run = """
grype sbom:.sbom/npm.json --fail-on high
grype sbom:.sbom/tauri.json --fail-on high
grype sbom:.sbom/relay.json --fail-on high
"""

[tasks.lint]
description = "Run oxlint over the frontend source"
run = "npm run lint"

[tasks.tsc]
description = "Run TypeScript type check"
run = "npx tsc --noEmit"

[tasks.test]
description = "Run unit tests"
run = "npx vitest run"

# Frontend bundle. src-tauri's generate_context!() embeds dist/ at compile time
# (release.yml builds the frontend before any cargo step), so the src-tauri Rust
# gate below depends on this.
[tasks.build]
description = "Build the frontend bundle (dist/)"
run = "npm run build"

# Rust gate (prexu-pd1x.10). The local gate previously ran only `cargo check` on
# the relay — src-tauri Rust and clippy never ran, so Rust breakage was invisible
# locally. Linux src-tauri clippy also runs nowhere in GitHub CI (only the
# Windows job clippies, and it cannot see #[cfg(target_os = "linux")] code), so
# this is the only place Linux-only lints/tests are caught before merge.
[tasks."clippy-relay"]
description = "Relay server clippy (-D warnings)"
dir = "relay-server"
run = "cargo clippy --all-targets -- -D warnings"

[tasks."test-relay"]
description = "Relay server tests (WS integration suite)"
dir = "relay-server"
run = "cargo test"

[tasks."clippy-tauri"]
description = "src-tauri clippy (-D warnings); needs the frontend bundle"
depends = ["build"]
dir = "src-tauri"
run = "cargo clippy --all-targets -- -D warnings"

[tasks."test-tauri"]
description = "src-tauri library unit tests (excludes the libmpv headless_mpv integration test)"
depends = ["build"]
dir = "src-tauri"
run = "cargo test --lib"

[tasks.e2e]
description = "Install Playwright browsers and run E2E tests"
run = "npx playwright install --with-deps chromium && npm run test:e2e -- --project=chromium"

# On-hardware probe suite (prexu-pd1x.2). `hw-probe` runs the auto checks +
# writes a report on the Linux dev box; the sub-tasks are the individual
# entry points. `hw-probe:selftest` is the mutation-checked verdict core — it
# needs only nushell (no app/GPU/compositor) so it runs in the CI gate.
[tasks."hw-probe"]
description = "On-hardware probe suite: log invariants + luminance + probes, with report (Linux dev box)"
run = "nu scripts/hw-probe/run.nu"

[tasks."hw-probe:selftest"]
description = "Mutation-checked self-tests for the hw-probe verdict core (CI-safe: nushell only)"
run = "nu scripts/hw-probe/selftest.nu"

[tasks."hw-probe:log"]
description = "Structured-log assertion runner over the newest app log"
run = "nu scripts/hw-probe/log-assert.nu"

[tasks."hw-probe:luminance"]
description = "Single luminance sample of the current screen (content/navy/black)"
run = "nu scripts/hw-probe/luminance.nu sample"

[tasks.ci]
description = "Full local gate: lint, tsc, unit tests, relay + src-tauri clippy/test, E2E, hw-probe selftest"
depends = ["lint", "tsc", "test", "clippy-relay", "test-relay", "clippy-tauri", "test-tauri", "e2e", "hw-probe:selftest"]
